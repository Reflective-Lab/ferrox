services:
  ferrox:
    build:
      context: ../          # parent dir so converge/ is reachable
      dockerfile: ferrox/Dockerfile
    image: ferrox-server:latest
    ports:
      - "50051:50051"
    volumes:
      - ./tls:/tls:ro       # bind-mount certs generated by `just tls-dev-certs`
    environment:
      FERROX_ADDR: "0.0.0.0:50051"
      FERROX_TLS_CERT: "/tls/server.crt"
      FERROX_TLS_KEY:  "/tls/server.key"
      # Uncomment for mTLS client verification:
      # FERROX_TLS_CA: "/tls/ca.crt"
      # Uncomment to require a bearer token on every call:
      # FERROX_AUTH_TOKEN: "changeme"
      RUST_LOG: "ferrox_server=info"
    restart: unless-stopped
